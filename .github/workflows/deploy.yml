name: Deploy to Plesk

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-plesk
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLESK_SSH_KEY }}
          log-public-key: false

      - name: Add Plesk host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PLESK_SSH_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to Plesk server
        env:
          SSH_USER: ${{ secrets.PLESK_SSH_USER || 'maqder.com_eucg0ssmgds' }}
          SSH_HOST: ${{ secrets.PLESK_SSH_HOST || 'maqder.com' }}
          SSH_PORT: ${{ secrets.PLESK_SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.PLESK_DEPLOY_PATH || '/var/www/vhosts/maqder.com/httpdocs' }}
        run: |
          echo "Deploying to ${SSH_USER}@${SSH_HOST}:${SSH_PORT} at ${DEPLOY_PATH}"
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" << 'EOF'
            set -e
            cd "${DEPLOY_PATH}"
            git fetch origin main
            git reset --hard origin/main
            docker-compose down
            docker-compose up -d --build
            docker-compose ps
          EOF
